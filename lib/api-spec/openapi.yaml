openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Church check-in and registration API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: organizations
    description: Church/organization settings
  - name: forms
    description: Registration form management
  - name: questions
    description: Form questions (legacy)
  - name: form_fields
    description: Form fields (new architecture — system + custom fields)
  - name: registrations
    description: Form registrations/submissions
  - name: children
    description: Child records
  - name: checkins
    description: Check-in operations
  - name: labels
    description: Label printing
  - name: stats
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /organizations/current:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get current organization settings
      responses:
        "200":
          description: Organization settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    put:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update organization settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationInput"
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /forms:
    get:
      operationId: listForms
      tags: [forms]
      summary: List all registration forms
      responses:
        "200":
          description: List of forms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Form"
    post:
      operationId: createForm
      tags: [forms]
      summary: Create a new registration form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormInput"
      responses:
        "201":
          description: Created form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all events
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an event and its linked registration form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventWithForm"

  /events/{eventId}/checkins:
    get:
      operationId: listEventCheckins
      tags: [events]
      summary: List all check-ins for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event check-ins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventCheckin"

  /events/{eventId}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get an event with its linked form
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event with form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventWithForm"
        "404":
          description: Not found
    put:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventInput"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /forms/by-slug/{embedSlug}:
    get:
      operationId: getFormBySlug
      tags: [forms]
      summary: Get a public form by its embed slug (no auth required)
      parameters:
        - name: embedSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Form with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormWithQuestions"
        "404":
          description: Not found

  /forms/{formId}:
    get:
      operationId: getForm
      tags: [forms]
      summary: Get a form with its questions
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Form with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormWithQuestions"
        "404":
          description: Not found
    put:
      operationId: updateForm
      tags: [forms]
      summary: Update a form
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormInput"
      responses:
        "200":
          description: Updated form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"
    delete:
      operationId: deleteForm
      tags: [forms]
      summary: Delete a form
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /forms/{formId}/questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List questions for a form
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Add a question to a form
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /forms/{formId}/questions/reorder:
    put:
      operationId: reorderQuestions
      tags: [questions]
      summary: Reorder questions in a form
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderInput"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"

  /forms/{formId}/questions/{questionId}:
    put:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /forms/{formId}/fields:
    get:
      operationId: listFormFields
      tags: [form_fields]
      summary: List form fields for a form (new architecture)
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of form fields
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormField"
    post:
      operationId: createFormField
      tags: [form_fields]
      summary: Add a field to a form
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormFieldInput"
      responses:
        "201":
          description: Created form field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormField"

  /forms/{formId}/fields/reorder:
    put:
      operationId: reorderFormFields
      tags: [form_fields]
      summary: Reorder fields in a form
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderFieldsInput"
      responses:
        "200":
          description: Reordered fields
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormField"

  /forms/{formId}/fields/{fieldId}:
    put:
      operationId: updateFormField
      tags: [form_fields]
      summary: Update a form field
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
        - name: fieldId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormFieldInput"
      responses:
        "200":
          description: Updated form field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormField"
    delete:
      operationId: deleteFormField
      tags: [form_fields]
      summary: Delete a form field
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
        - name: fieldId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /forms/{formId}/register:
    post:
      operationId: submitRegistration
      tags: [registrations]
      summary: Submit a registration (public endpoint for embedded forms)
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registration submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  /forms/{formId}/registrations:
    get:
      operationId: listRegistrations
      tags: [registrations]
      summary: List registrations for a form
      parameters:
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Registration"

  /registrations/{registrationId}:
    get:
      operationId: getRegistration
      tags: [registrations]
      summary: Get a registration with answers
      parameters:
        - name: registrationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registration with answers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationDetail"

  /children:
    get:
      operationId: listChildren
      tags: [children]
      summary: List all children
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of children
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Child"

  /children/{childId}:
    get:
      operationId: getChild
      tags: [children]
      summary: Get a child record
      parameters:
        - name: childId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Child record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"

  /checkins/batch:
    post:
      operationId: batchCheckin
      tags: [checkins]
      summary: Check in multiple children with a shared family security code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCheckinInput"
      responses:
        "201":
          description: Batch check-in result with shared labels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCheckinResult"

  /checkins:
    get:
      operationId: listCheckins
      tags: [checkins]
      summary: List today's check-ins
      parameters:
        - name: date
          in: query
          schema:
            type: string
        - name: formId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of check-ins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CheckIn"
    post:
      operationId: createCheckin
      tags: [checkins]
      summary: Check in a child
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInInput"
      responses:
        "201":
          description: Check-in record with label data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInWithLabel"

  /checkins/{checkinId}:
    delete:
      operationId: deleteCheckin
      tags: [checkins]
      summary: Delete a check-in record (undo an accidental check-in)
      parameters:
        - name: checkinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /checkins/{checkinId}/checkout:
    put:
      operationId: checkoutChild
      tags: [checkins]
      summary: Check out a child
      parameters:
        - name: checkinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated check-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIn"

  /checkins/{checkinId}/undo-checkout:
    put:
      operationId: undoCheckout
      tags: [checkins]
      summary: Undo a check-out (clear checkoutAt, restoring child to checked-in state)
      parameters:
        - name: checkinId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated check-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIn"

  /admin/reset:
    delete:
      operationId: resetAllData
      tags: [admin]
      summary: Delete all events, forms, registrations, check-ins, and children
      responses:
        "204":
          description: All data deleted

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics
      parameters:
        - name: eventId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/checkins-by-day:
    get:
      operationId: getCheckinsByDay
      tags: [stats]
      summary: Get check-in counts by day (last 30 days)
      parameters:
        - name: eventId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Check-ins per day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DayCount"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Organization:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        logoUrl:
          type: ["string", "null"]
        primaryColor:
          type: string
        headerText:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        updatedAt:
          type: string

    OrganizationInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        logoUrl:
          type: string
        primaryColor:
          type: string
        headerText:
          type: string
        address:
          type: string
        phone:
          type: string
        website:
          type: string

    Form:
      type: object
      required: [id, title, isActive, isPublic]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        isActive:
          type: boolean
        isPublic:
          type: boolean
        allowAdditionalPeople:
          type: boolean
        embedSlug:
          type: string
        submissionCount:
          type: integer
        createdAt:
          type: string

    FormInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        isPublic:
          type: boolean
        allowAdditionalPeople:
          type: boolean

    FormWithQuestions:
      type: object
      required: [id, title, isActive, isPublic, questions]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        isActive:
          type: boolean
        isPublic:
          type: boolean
        allowAdditionalPeople:
          type: boolean
        embedSlug:
          type: string
        submissionCount:
          type: integer
        createdAt:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
        formFields:
          type: array
          items:
            $ref: "#/components/schemas/FormField"

    Question:
      type: object
      required: [id, formId, label, type, required, order]
      properties:
        id:
          type: integer
        formId:
          type: integer
        label:
          type: string
        type:
          type: string
          enum: [text, textarea, select, multiselect, checkbox, date, phone, email, number]
        required:
          type: boolean
        order:
          type: integer
        placeholder:
          type: ["string", "null"]
        options:
          type: ["string", "null"]
        isChildField:
          type: boolean
        fieldKey:
          type: ["string", "null"]

    QuestionInput:
      type: object
      required: [label, type, required, order]
      properties:
        label:
          type: string
        type:
          type: string
          enum: [text, textarea, select, multiselect, checkbox, date, phone, email, number]
        required:
          type: boolean
        order:
          type: integer
        placeholder:
          type: string
        options:
          type: string
        isChildField:
          type: boolean
        fieldKey:
          type: string

    ReorderInput:
      type: object
      required: [questionIds]
      properties:
        questionIds:
          type: array
          items:
            type: integer

    FormField:
      type: object
      required: [id, formId, fieldKind, label, fieldType, required, sortOrder]
      properties:
        id:
          type: integer
        formId:
          type: integer
        fieldKind:
          type: string
          enum: [system, custom]
        systemKey:
          type: ["string", "null"]
        label:
          type: string
        fieldType:
          type: string
          enum: [text, textarea, select, multiselect, checkbox, date, phone, email, number]
        placeholder:
          type: ["string", "null"]
        required:
          type: boolean
        sortOrder:
          type: integer
        options:
          type: ["string", "null"]

    FormFieldInput:
      type: object
      required: [label]
      properties:
        fieldKind:
          type: string
          enum: [system, custom]
        systemKey:
          type: string
        label:
          type: string
        fieldType:
          type: string
          enum: [text, textarea, select, multiselect, checkbox, date, phone, email, number]
        placeholder:
          type: string
        required:
          type: boolean
        sortOrder:
          type: integer
        options:
          type: string

    ReorderFieldsInput:
      type: object
      required: [fieldIds]
      properties:
        fieldIds:
          type: array
          items:
            type: integer

    Registration:
      type: object
      required: [id, formId, childFirstName, childLastName, createdAt]
      properties:
        id:
          type: integer
        formId:
          type: integer
        childFirstName:
          type: string
        childLastName:
          type: string
        childDateOfBirth:
          type: ["string", "null"]
        guardianName:
          type: string
        guardianPhone:
          type: string
        guardianEmail:
          type: ["string", "null"]
        allergies:
          type: ["string", "null"]
        specialNeeds:
          type: ["string", "null"]
        room:
          type: ["string", "null"]
        createdAt:
          type: string

    RegistrationDetail:
      type: object
      required: [id, formId, childFirstName, childLastName, createdAt, answers]
      properties:
        id:
          type: integer
        formId:
          type: integer
        childFirstName:
          type: string
        childLastName:
          type: string
        childDateOfBirth:
          type: ["string", "null"]
        guardianName:
          type: string
        guardianPhone:
          type: string
        guardianEmail:
          type: ["string", "null"]
        allergies:
          type: ["string", "null"]
        specialNeeds:
          type: ["string", "null"]
        room:
          type: ["string", "null"]
        createdAt:
          type: string
        answers:
          type: array
          items:
            $ref: "#/components/schemas/Answer"

    RegistrationInput:
      type: object
      required: [fields]
      properties:
        fields:
          type: array
          description: >
            One entry per form field submitted. System fields are routed to the
            appropriate participant/guardian/emergency_contact columns server-side.
            Custom question answers are stored in registration_custom_answers.
          items:
            $ref: "#/components/schemas/FieldSubmission"

    FieldSubmission:
      type: object
      required: [fieldId, value]
      properties:
        fieldId:
          type: integer
          description: The form_fields.id this answer is for.
        value:
          type: string
          description: The submitted value (always a string; checkboxes use "true"/"false").

    Answer:
      type: object
      required: [id, questionId, questionLabel, value]
      properties:
        id:
          type: integer
        questionId:
          type: integer
        questionLabel:
          type: string
        value:
          type: string

    AnswerInput:
      type: object
      required: [questionId, value]
      properties:
        questionId:
          type: integer
        value:
          type: string

    Child:
      type: object
      required: [id, firstName, lastName]
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: ["string", "null"]
        guardianName:
          type: string
        guardianPhone:
          type: string
        guardianEmail:
          type: ["string", "null"]
        allergies:
          type: ["string", "null"]
        specialNeeds:
          type: ["string", "null"]
        room:
          type: ["string", "null"]
        lastCheckinAt:
